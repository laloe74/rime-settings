# Rime default settings
# encoding: utf-8

config_version: '2026-02-06'

# 方案列表
schema_list:
  - schema: rime_ice # 雾凇拼音（全拼）

# 菜单
menu:
  page_size: 5 # 候选词个数

# 方案选单相关
switcher:
  caption: 「方案选单」
  hotkeys:
    - F4
    - Control+grave
    - Control+Shift+grave
  # 开关记忆（方案中的 switches），从方案选单切换时会记住的选项，需要记忆的开关不能设定 reset
  save_options:
    - ascii_punct
    - traditionalization
    - full_shape
    - search_single_char
  fold_options: false # 呼出时是否折叠

# 处理输入栏内光标的移动
# 需要 librime >= 1.16.0 才有 no_loop 等属性，才会自动在方案引用 default:/{navigator,selector}
# 在边界按音节移动，在音节内部按字符移动  rewind | forward
# 按字符移动（循环）       left_by_char | right_by_char
# 按字符移动（不循环）     left_by_char_no_loop | right_by_char_no_loop
# 按音节跳转（循环）       left_by_syllable | right_by_syllable
# 按音节跳转（不循环）     left_by_syllable_no_loop | right_by_syllable_no_loop
# 首尾跳转               home | end
navigator:
  bindings:
    Left: left_by_char_no_loop
    Right: right_by_char_no_loop
    Shift+Left: left_by_syllable
    Shift+Right: right_by_syllable
    # 其他键 KP_Left KP_Right Home KP_Home End KP_End

###################################################################################

# 标点符号
# 设置为一个映射，就自动上屏；设置为多个映射，如 '/' : [ '/', ÷ ] 则进行复选。
#   full_shape: 全角没改，使用预设值
#   half_shape: 标点符号全部直接上屏，和 macOS 自带输入法的区别是
#              '|' 是半角的，
#              '~' 是半角的。
punctuator:
  digit_separators: ",.:"  # 在此处指定的字符，在数字后被输入，若再次输入数字，则连同数字直接上屏；若双击，则恢复映射。 # librime >= 1.13.0
  full_shape:
    " ": { commit: "　" }
    ",": { commit: ， }
    ".": { commit: 。 }
    "<": [《, 〈, «, ‹]
    ">": [》, 〉, », ›]
    "/": [／, ÷]
    "?": { commit: ？ }
    ";": { commit: ； }
    ":": { commit: ： }
    "'": { pair: ["‘", "’"] }
    '"': { pair: ["『", "』"] }
    "\\": [、, ＼]
    "|": [·, ｜, "§", "¦"]
    "`": ｀
    "~": ～
    "!": { commit: ！ }
    "@": [＠, ☯]
    "#": [＃, ⌘]
    "%": [％, "°", "℃"]
    "$": [￥, "$", "€", "£", "¥", "¢", "¤", ₩]
    "^": { commit: "^" }
    "&": ＆
    "*": [＊, ·, ・, ×, ※, ❂]
    "(": （
    ")": ）
    "-": －
    "_": ——
    "+": ＋
    "=": [＝, 々, 〃]
    "[": [「, 【, 〔, ［, 〚, 〘]
    "]": [」, 】, 〕, ］, 〛, 〙]
    "{": [『, 〖, ｛]
    "}": [』, 〗, ｝]
  half_shape:
    # ',' : { commit: ， }
    # '.' : { commit: 。 }
    # '<' : [ 《, 〈, «, ‹, ˂, ˱ ]
    # '>' : [ 》, 〉, », ›, ˃, ˲ ]
    # '/' : [ 、, ､, '/', ／, ÷ ]
    # '?' : { commit: ？ }
    # ';' : { commit: ； }
    # ':' : { commit: ： }
    # '''' : { pair: [ '‘', '’' ] }
    # '"' : { pair: [ '“', '”' ] }
    # '\' : [ 、, '\', ＼ ]
    # '|' : [ ·, ・, '|', ｜, '§', '¦', '‖', ︴ ]
    # '`' : [ '`', ‵, ‶, ‷, ′, ″, ‴, ⁗ ]
    # '~' : [ '~', ～, ˜, ˷, ⸯ, ≈, ≋, ≃, ≅, ≇, ∽, ⋍, ≌, ﹏, ﹋, ﹌, ︴ ]
    # '!' : { commit: ！ }
    # '@' : [ '@', ©, ®, ℗ ]
    # '#' : [ '#', № ]
    # '%' : [ '%', ％, '°', '℃', ‰, ‱, ℉, ℅, ℆, ℀, ℁, ⅍ ]
    # '$' : [ ￥, '$', '€', '£', '¥', '¢', '¤', ₩ ]
    # '^' : { commit: …… }
    # '&' : '&'
    # '*' : [ '*', ＊, ·, ・, ×, ※, ❂, ⁂, ☮, ☯, ☣ ]
    # '(' : （
    # ')' : ）
    # '-' : '-'
    # '_' : ——
    # '+' : '+'
    # '=' : [ '=', 々, 〃 ]
    # '[' : [ 「, 【, 〔, ［, 〚, 〘 ]
    # ']' : [ 」, 】, 〕, ］, 〛, 〙 ]
    # '{' : [ 『, 〖, ｛ ]
    # '}' : [ 』, 〗, ｝ ]
    "!": { commit: "！" }
    "#": "#"
    "$": "$"
    "%": "%"
    "&": "&"
    "'": { pair: ["「", "」"] }
    '"': "\""
    "(": "（"
    ")": "）"
    "*": "*"
    "+": "+"
    ",": { commit: "，" }
    "-": "-"
    .: { commit: "。" }
    "/": "/"
    ":": { commit: "：" }
    ";": { commit: "；" }
    "<": "《"
    "=": "="
    ">": "》"
    "?": { commit: "？" }
    "@": "@"
    "[": "["
    "\\": { commit: 、 }
    "]": "]"
    "^": "^"
    _: "_"
    "`": "`"
    "{": "{"
    "|": "|"
    "}": "}"
    "~": "~"


# 处理符合特定规则的输入码，如网址、反查
# 此处配置较为通用的选项，各方案中另增加了和方案功能绑定的 patterns。
recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"                            # email @ 之后不上屏
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"  # URL
    underscore: "^[A-Za-z]+_.*"  # 下划线不上屏
    url_2: "^[A-Za-z]+[.].*"     # 句号不上屏，支持 google.com abc.txt 等网址或文件名，使用句号翻页时需要注释掉


# 快捷键
key_binder:
  # Lua 配置: 以词定字（上屏当前词句的第一个或最后一个字）
  select_first_character: "bracketleft"  # 左中括号 [
  select_last_character: "bracketright"  # 右中括号 ]

  bindings:
    # Tab / Shift+Tab 切换光标至下/上一个拼音
    - { when: composing, accept: ISO_Left_Tab, send: Shift+Left }
    - { when: composing, accept: Shift+Tab, send: Shift+Left }
    - { when: composing, accept: Tab, send: Shift+Right }

    # Option/Alt + ←/→ 切换光标至下/上一个拼音
    - { when: composing, accept: Alt+Left, send: Shift+Left }
    - { when: composing, accept: Alt+Right, send: Shift+Right }

    # 翻页 - =
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }

    # 切换简繁
    - { when: always, toggle: traditionalization, accept: Control+Shift+4 }
    - { when: always, toggle: traditionalization, accept: Control+Shift+dollar }  # 切换简繁

    # emacs_editing:
    - { when: composing, accept: Control+a, send: Home }
    - { when: composing, accept: Control+e, send: End }

    # 将小键盘 0~9 . 映射到主键盘，数字金额大写的 Lua 如 R1234.5678 可使用小键盘输入
    - {accept: KP_0, send: 0, when: composing}
    - {accept: KP_1, send: 1, when: composing}
    - {accept: KP_2, send: 2, when: composing}
    - {accept: KP_3, send: 3, when: composing}
    - {accept: KP_4, send: 4, when: composing}
    - {accept: KP_5, send: 5, when: composing}
    - {accept: KP_6, send: 6, when: composing}
    - {accept: KP_7, send: 7, when: composing}
    - {accept: KP_8, send: 8, when: composing}
    - {accept: KP_9, send: 9, when: composing}
    - {accept: KP_Decimal, send: period, when: composing}
    # 将小键盘 + - * / 映射到主键盘，使计算器 如 1+2-3*4 可使用小键盘输入
    - {accept: KP_Multiply, send: asterisk, when: composing}
    - {accept: KP_Add,      send: plus,     when: composing}
    - {accept: KP_Subtract, send: minus,    when: composing}
    - {accept: KP_Divide,   send: slash,    when: composing}
    # 将小键盘回车映射到主键盘回车
    - {accept: KP_Enter,    send: Return,   when: composing}
